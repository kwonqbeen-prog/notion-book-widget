<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Book Search Widget</title>
    <style>
        :root {
            --notion-bg: transparent;
            --notion-input-bg: #f1f1ef;
            --notion-text: #37352f;
            --notion-border: rgba(55, 53, 47, 0.16);
            --notion-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--notion-font);
            color: var(--notion-text);
            background-color: var(--notion-bg);
            overflow-x: hidden;
        }

        .widget-container {
            width: 100%;
            padding: 0 0 4px 0; /* 상단 여백을 0으로 변경 */
        }

        /* [수정] 모바일 아이콘 간섭 방지를 위한 제목 행 */
        .widget-header {
            font-size: 16px;
            font-weight: 500;
            margin-top: 0px;
            margin-bottom: 12px;
            padding-left: 0px;
            color: var(--notion-text);
            display: flex;
            align-items: center;
        }

        .search-area {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            align-items: center;
            padding-right: 2px; /* 오른쪽 끝 미세 여백 */
        }

        input[type="text"] {
            flex: 1;
            min-width: 0;
            background-color: var(--notion-input-bg);
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            color: var(--notion-text);
        }

        .notion-button {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            border: 1px solid #e9e9e8;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--notion-text);
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.1s ease;
        }

        .notion-button:hover {
            background-color: #f1f1ef;
        }

        .separator {
            display: inline-block;
            width: 1px;
            height: 10px;
            background-color: rgba(55, 53, 47, 0.2);
            margin: 0 8px;
            vertical-align: middle;
        }

        #result-list {
            max-height: 350px;
            overflow-y: auto;
        }

        .book-item {
            display: flex;
            padding: 12px 8px;
            border-bottom: 1px solid var(--notion-border);
            cursor: pointer;
            transition: background 0.1s ease;
            align-items: center;
        }

        .book-item:hover {
            background-color: rgba(55, 53, 47, 0.04);
        }

        .thumbnail {
            width: 45px;
            height: 65px;
            object-fit: cover;
            border-radius: 3px;
            margin-right: 14px;
            flex-shrink: 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .book-info {
            flex: 1;
            min-width: 0;
        }

        .book-title {
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .book-meta {
            font-size: 12px;
            color: rgba(55, 53, 47, 0.6);
            margin: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #result-list::-webkit-scrollbar { width: 4px; }
        #result-list::-webkit-scrollbar-thumb { background: var(--notion-border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="widget-container">
    <div class="widget-header">도서 검색</div>
    
    <div class="search-area">
        <input type="text" id="search-input" placeholder="">
        <button onclick="searchBooks()" class="notion-button">검색</button>
    </div>
    <div id="result-list"></div>
</div>

<script>
    const KAKAO_API_KEY = 'd227fec4310ee8dfb46632079553dec1'; 
    const MAKE_WEBHOOK_URL = 'https://hook.eu1.make.com/j2n4rwrpv9e7jt5k5f2f37xlkp537qti'; 

    const searchInput = document.getElementById('search-input');
    const resultList = document.getElementById('result-list');

    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchBooks();
    });

    async function searchBooks() {
        const query = searchInput.value.trim();
        if (!query) return;

        resultList.innerHTML = '';

        try {
            const response = await fetch(`https://dapi.kakao.com/v3/search/book?query=${encodeURIComponent(query)}`, {
                headers: { 'Authorization': `KakaoAK ${KAKAO_API_KEY}` }
            });
            const data = await response.json();
            displayResults(data.documents);
        } catch (error) {
            console.error("Search failed");
        }
    }

    function displayResults(books) {
        if (books.length === 0) {
            resultList.innerHTML = '<p style="font-size:13px; text-align:center; padding: 20px; color:rgba(55, 53, 47, 0.5);">결과 없음</p>';
            return;
        }

        books.forEach(book => {
            const authors = book.authors.length > 0 ? `${book.authors.join(', ')} 저` : '';
            const translators = book.translators.length > 0 ? `${book.translators.join(', ')} 역` : '';
            const combinedAuth = [authors, translators].filter(Boolean).join(', ');
            const publisher = book.publisher || '';
            const pubYear = book.datetime ? book.datetime.substring(0, 4) : '';

            const infoParts = [];
            if (combinedAuth) infoParts.push(combinedAuth);
            if (publisher) infoParts.push(publisher);
            if (pubYear) infoParts.push(pubYear);

            const metaHtml = infoParts.join('<span class="separator"></span>');

            const item = document.createElement('div');
            item.className = 'book-item';
            item.innerHTML = `
                <img class="thumbnail" src="${book.thumbnail || 'https://via.placeholder.com/45x65?text=No+Img'}" alt="cover">
                <div class="book-info">
                    <p class="book-title" title="${book.title}">${book.title}</p>
                    <p class="book-meta">${metaHtml}</p>
                </div>
            `;
            item.onclick = () => saveToNotionViaMake(book);
            resultList.appendChild(item);
        });
    }

    async function saveToNotionViaMake(book) {
        if (!MAKE_WEBHOOK_URL) return;

        const authorInfo = book.authors.join(', ') + ' 저' + (book.translators.length > 0 ? ', ' + book.translators.join(', ') + ' 역' : '');
        const pubYear = book.datetime ? book.datetime.substring(0, 4) : '';

        try {
            await fetch(MAKE_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title: book.title,
                    author: authorInfo,
                    publisher: book.publisher,
                    year: pubYear,
                    isbn: book.isbn,
                    image: book.thumbnail
                })
            });
        } catch (error) {
            console.error("Save failed");
        }
    }
</script>
</body>
</html>
